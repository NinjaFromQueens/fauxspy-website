name: Backlink Outreach Finder

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10am UTC (after revenue + message digests)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  find:
    name: Find & Send Backlink Outreach
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find and send outreach
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/backlink-finder.js

      - name: Commit outreach state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outreach-state.json
          git diff --cached --quiet || git commit -m "chore: update outreach state [skip ci]"
          git push
