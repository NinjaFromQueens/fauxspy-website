name: User Message Digest

on:
  schedule:
    - cron: '30 9 * * 1'  # Every Monday at 9:30am UTC (30 min after revenue digest)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  digest:
    name: Weekly User Messages Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate message digest
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/message-digest.js
