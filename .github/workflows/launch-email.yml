name: Product Hunt Launch Email

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC — script decides if today is a send day
  workflow_dispatch:       # Manual trigger

jobs:
  send:
    name: Send Launch Broadcast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send launch email to waitlist
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          RESEND_FROM_EMAIL: "Duron at Faux Spy <duron@fauxspy.com>"
        run: node scripts/send-launch-email.js
