name: IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Submit pages to IndexNow
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "fauxspy.com",
              "key": "a3f8b2e1d94c6071a5b8d23e1f406789",
              "keyLocation": "https://fauxspy.com/a3f8b2e1d94c6071a5b8d23e1f406789.txt",
              "urlList": [
                "https://fauxspy.com/",
                "https://fauxspy.com/pro",
                "https://fauxspy.com/faq",
                "https://fauxspy.com/deepfake-detector",
                "https://fauxspy.com/catfish-detector",
                "https://fauxspy.com/dating-apps",
                "https://fauxspy.com/instagram",
                "https://fauxspy.com/linkedin",
                "https://fauxspy.com/pinterest",
                "https://fauxspy.com/tiktok",
                "https://fauxspy.com/ai-art-detector",
                "https://fauxspy.com/buy-tokens",
                "https://fauxspy.com/contact",
                "https://fauxspy.com/privacy",
                "https://fauxspy.com/terms",
                "https://fauxspy.com/refunds",
                "https://fauxspy.com/account",
                "https://fauxspy.com/tinder",
                "https://fauxspy.com/bumble",
                "https://fauxspy.com/hinge",
                "https://fauxspy.com/how-to-spot-ai-generated-images",
                "https://fauxspy.com/romance-scam-warning-signs",
                "https://fauxspy.com/blog",
                "https://fauxspy.com/blog/signs-someone-is-catfishing-you",
                "https://fauxspy.com/blog/ai-generated-profile-pictures",
                "https://fauxspy.com/blog/how-catfish-scams-work",
                "https://fauxspy.com/blog/reverse-image-search-vs-ai-detector",
                "https://fauxspy.com/blog/deepfake-fraud-statistics",
                "https://fauxspy.com/blog/protect-yourself-romance-scams",
                "https://fauxspy.com/facebook",
                "https://fauxspy.com/what-do-ai-faces-look-like",
                "https://fauxspy.com/best-deepfake-detector",
                "https://fauxspy.com/online-dating-safety"
              ]
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "IndexNow response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Unexpected status: $HTTP_CODE"
            exit 1
          fi
