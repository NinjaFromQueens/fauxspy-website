name: IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build URL list from sitemap and submit to IndexNow
        run: |
          # Extract all <loc> URLs from sitemap.xml
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml | head -500)
          URL_COUNT=$(echo "$URLS" | wc -l)
          echo "Found $URL_COUNT URLs in sitemap.xml"

          # Build JSON array of URLs
          URL_JSON=$(echo "$URLS" | python3 -c "
          import sys, json
          urls = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps(urls))
          ")

          # Submit to IndexNow (covers Bing, Yandex, and other IndexNow partners)
          PAYLOAD=$(python3 -c "
          import json
          urls = $URL_JSON
          payload = {
            'host': 'www.fauxspy.com',
            'key': 'a3f8b2e1d94c6071a5b8d23e1f406789',
            'keyLocation': 'https://www.fauxspy.com/a3f8b2e1d94c6071a5b8d23e1f406789.txt',
            'urlList': urls
          }
          print(json.dumps(payload))
          ")

          echo "Submitting $URL_COUNT URLs to IndexNow..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "IndexNow response: HTTP $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Unexpected status: $HTTP_CODE — continuing anyway (non-fatal)"
          else
            echo "✅ Successfully submitted $URL_COUNT URLs to IndexNow"
          fi
