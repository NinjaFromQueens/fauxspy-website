name: Auto Blog Draft

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  draft:
    name: Auto-Generate Blog Draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pick next blog topic
        id: topic
        run: node scripts/pick-blog-topic.js

      - name: Skip if all topics published
        if: steps.topic.outputs.BLOG_TOPIC == ''
        run: |
          echo "All topics have been published — nothing to draft this week."
          exit 0

      - name: Generate blog draft
        if: steps.topic.outputs.BLOG_TOPIC != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          BLOG_TOPIC: ${{ steps.topic.outputs.BLOG_TOPIC }}
          BLOG_CATEGORY: ${{ steps.topic.outputs.BLOG_CATEGORY }}
        run: node scripts/seo-blog-draft.js

      - name: Create PR for review
        if: steps.topic.outputs.BLOG_TOPIC != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blog-draft[bot]"
          git config user.email "blog-draft@fauxspy.com"

          TOPIC="${{ steps.topic.outputs.BLOG_TOPIC }}"
          SLUG=$(echo "$TOPIC" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 -]//g' | tr -s ' ' '-' | cut -c1-60)
          BRANCH="blog-draft-${SLUG}-${{ github.run_number }}"

          git checkout -b "$BRANCH"
          git add blog/ sitemap.xml .github/workflows/indexnow.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "draft(blog): add article — $TOPIC [auto #${{ github.run_number }}]"
          git push origin "$BRANCH"

          gh pr create \
            --title "Blog draft: $TOPIC" \
            --body-file blog-draft-summary.md \
            --base main \
            --head "$BRANCH" \
            || true

          echo "✅ PR created for: $TOPIC — review and merge to publish."
