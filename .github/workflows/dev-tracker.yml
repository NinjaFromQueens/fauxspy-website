name: Dev Tracker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  track:
    name: Update Dev Log
    runs-on: ubuntu-latest
    # Skip if this is the dev-tracker's own commit
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: update dev-log')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Need full history for git log

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dev tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/dev-tracker.js

      - name: Commit updated dev-log.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev-log.md
          git diff --cached --quiet || git commit -m "chore: update dev-log [skip ci]"
          git push
