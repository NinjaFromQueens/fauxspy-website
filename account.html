<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - Faux Spy</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .account-container {
      max-width: 540px;
      margin: 80px auto;
      padding: 40px 32px;
      text-align: center;
    }
    
    .account-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .account-form {
      margin-top: 32px;
    }
    
    .account-form input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 16px;
    }
    
    .account-form input:focus {
      outline: none;
      border-color: var(--gold);
    }
  </style>
  <!-- Vercel Analytics (free, no setup) -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <img src="/logo.png" alt="Faux Spy" width="32" height="32">
        <span class="nav-brand">Faux Spy</span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pro">Pro</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </nav>

  <section class="account-container">
    <div class="account-icon">⚙️</div>
    <h1 style="font-family: Georgia, serif; font-style: italic;">Manage Your Subscription</h1>
    <p style="color: var(--text-secondary); margin-top: 16px;">
      Enter the email you used at checkout. We'll send you a secure link to manage your subscription, update payment, or cancel.
    </p>
    
    <form class="account-form" id="portalForm">
      <input 
        type="email" 
        id="emailInput" 
        placeholder="your@email.com" 
        required
      >
      <button type="submit" class="btn btn-primary btn-large btn-block" id="portalBtn">
        📧 Send Management Link
      </button>
    </form>
    
    <div id="successMessage" style="display: none; margin-top: 24px; padding: 16px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; color: #34d399;">
      ✅ Check your email for the management link!
    </div>
    
    <div id="errorMessage" style="display: none; margin-top: 24px; padding: 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #f87171;">
      <span id="errorText"></span>
    </div>
    
    <p style="color: var(--text-tertiary); font-size: 13px; margin-top: 32px;">
      Need help? <a href="/contact" style="color: var(--gold);">Contact support</a>
    </p>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2025 Faux Spy. Spy on the fakes.</p>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('portalForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('emailInput').value.trim();
      const btn = document.getElementById('portalBtn');
      const success = document.getElementById('successMessage');
      const error = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      
      success.style.display = 'none';
      error.style.display = 'none';
      
      btn.disabled = true;
      btn.textContent = '🔄 Processing...';
      
      try {
        const response = await fetch('/api/billing-portal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (data.url) {
          // Direct redirect to Stripe portal
          window.location.href = data.url;
        } else if (response.ok) {
          // Email sent
          success.style.display = 'block';
        } else {
          throw new Error(data.message || 'Could not generate portal link');
        }
      } catch (err) {
        errorText.textContent = err.message + '. Please contact support if this persists.';
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '📧 Send Management Link';
      }
    });
  </script>
</body>
</html>
